proves:
  - Quote integrity and connection to an accepted quoting credential under the selected trust model
  - Reported TD measurements, attributes, and TCB-related state for appraisal
  - Equality between REPORTDATA D and a digest recomputed from retained expected context and approved canonical key bytes
  - Result linkage to exact Quote octets E, appraisal policy version, and allow-only approved key digest K
  - Comparability of reported measurements with approved reference values
does_not_prove:
  - Code correctness or absence of vulnerabilities
  - Automatic identity of a container or process inside the TD
  - Safe future behavior after attestation
  - Freshness without retained and terminally consumed challenge state or an equivalent mechanism
  - Private-key possession, Result authenticity, or authorization without their separate checks
  - Availability or elimination of all side-channel, I/O, physical, and supply-chain risks
implications:
  developer:
    - Implement one versioned K/D/E digest suite over canonical bytes and exact Quote octets.
    - Make request context, key bytes, Quote bytes, Result claims, and challenge state first-class artifacts.
    - Verify Result signature/profile/policy/time/E/K, then proof of possession and the same key-bound channel.
    - Consume state atomically on allow, deny, or expiry; retries receive a fresh nonce.
    - Add independent workload Evidence when protected identity is a container rather than the whole TD.
  technical_executive:
    - Start with one high-value, revocable key-release pilot.
    - Assign separate single-accountable owners for Evidence appraisal and asset release policy.
    - Default to deny-without-key during invalid, stale, revoked, misdirected, substituted-key, or unavailable Evidence.
    - Set numeric clock-skew, collateral-outage, revocation-to-deny, and re-attestation targets before launch.
    - Measure zero release on negative tests, one terminal decision per challenge, policy auditability, and rollback readiness.
caveats:
  - Intel-rats is a visual teaching artifact, not deployable quote-verification reference code.
  - Its detailed Background Check route differs from RFC 9334 and some aggregate edges disagree with detailed sequences.
  - It omits first-class nonce, audience, expiry, and workload Evidence plus concrete Quote structures, DCAP calls, deployment code, policy language, and a step-by-step SGX flow.
exclusions:
  - Version-specific Intel Quote binary-field enumeration and full DCAP API instructions
  - A universal Result token standard; K/D/E and Result fields are an explicit example profile
  - Vendor selection or production-readiness recommendation
  - Organization-specific numeric SLO values, which owners must set before pilot launch
  - A claim that TDX removes every infrastructure, application, or side-channel risk
glossary:
  TD: Trust Domain, a TDX-protected virtual machine
  TDREPORT: Same-platform local report produced by the TDX Module at the TD's request
  TD Quote: TDQE-signed Evidence designed for remote verification
  QGS daemon: Non-enclave host communication/orchestration layer that transports reports and Quotes
  TDQE: Quoting Enclave that checks a same-platform TDREPORT and signs the TD Quote
  Verifier: Component that retains nonce context, verifies/appraises Evidence, and signs the Result
  Attestation Result: Verifier-signed decision input bound to request, policy, Evidence E, validity window, and allow-only key K
  Relying Party: Service that validates the Result and enforces the final action
  PCS: Intel upstream source of signed certification, revocation, QE, and TCB collateral
  PCCS: Cache and transport for signed collateral, not the authority
  REPORTDATA: 64 caller-supplied bytes integrity-bound into the report; this profile stores D
  K: Digest of protocol-canonical public-key bytes
  D: Digest of retained request context and K, stored in REPORTDATA
  E: Digest of the exact transported TD Quote octets
