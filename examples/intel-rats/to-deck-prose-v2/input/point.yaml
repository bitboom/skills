  - {id: C-009, concept: "SGX versus TDX attested scope"}
model:
  topology: background_check_with_signed_result_profile
  nodes:
    - {id: N-001, label: "Policy and reference-value owners", role: "supply appraisal and result-use policy"}
    - {id: N-002, label: "Relying Party / KMS", role: "owns request identity, validates Result and key, enforces release"}
    - {id: N-003, label: "Verifier", role: "issues nonce, retains one-time expected context, verifies/appraises Evidence, signs Result"}
    - {id: N-004, label: "TD / Attester", role: "creates ephemeral key, requests TDREPORT, returns Quote/key bytes, proves possession"}
    - {id: N-005, label: "non-enclave QGS daemon", role: "host-side orchestration and transport; cannot sign an accepted Quote"}
    - {id: N-006, label: "TDQE enclave", role: "validates same-platform TDREPORT and signs TD Quote"}
    - {id: N-007, label: "Intel PCS", role: "upstream publisher of signed certification, revocation, QE, and TCB collateral"}
    - {id: N-008, label: "PCCS", role: "cache and transport for signed collateral; not the authority"}
  edges:
    - {id: E-001, from: N-001, to: N-003, artifact: "reference values and Evidence appraisal policy"}
    - {id: E-002, from: N-001, to: N-002, artifact: "Result-use and release policy"}
    - {id: E-003, from: N-002, to: N-003, artifact: "request ID, subject, audience"}
    - {id: E-004, from: N-003, to: N-002, artifact: "nonce; Verifier retains the full one-time expected context"}
    - {id: E-005, from: N-002, to: N-004, artifact: "nonce, request ID, subject, audience, digest suite and key-binding request"}
    - {id: E-006, from: N-004, to: N-005, artifact: "TDREPORT containing the instantiated suite's 64-byte encoding of D"}
    - {id: E-007, from: N-005, to: N-006, artifact: "same-platform TDREPORT plus generation input"}
    - {id: E-008, from: N-007, to: N-008, artifact: "signed PCK Certificate, CRLs, QE Identity, and TCB Info"}
    - {id: E-009, from: N-008, to: N-005, artifact: "cached PCK Certificate and quote configuration"}
    - {id: E-010, from: N-006, to: N-005, artifact: "TDQE-signed TD Quote"}
    - {id: E-011, from: N-005, to: N-004, artifact: "TD Quote returned through TD/QGL guest path"}
    - {id: E-012, from: N-004, to: N-002, artifact: "exact TD Quote octets, canonical public-key bytes, and request context"}
    - {id: E-013, from: N-002, to: N-003, artifact: "Evidence, canonical public-key bytes, identical request context, digest suite ID"}
    - {id: E-014, from: N-008, to: N-003, artifact: "cached signed certificate chain, CRLs, QE Identity, and TCB Info"}
    - {id: E-015, from: N-003, to: N-002, artifact: "Verifier-signed Result with verdict, profile/policy versions, E, and allow-only approved K"}
    - {id: E-016, from: N-002, to: N-004, artifact: "proof-of-possession challenge for approved K"}
    - {id: E-017, from: N-004, to: N-002, artifact: "response signed by the ephemeral private key"}
    - {id: E-018, from: N-002, to: N-004, artifact: "secret over a channel authenticated by approved K"}
  boundaries:
    - {id: B-001, label: "infrastructure boundary", separates: "host operator from TD"}
    - {id: B-002, label: "QGS-to-TDQE boundary", separates: "untrusted daemon transport from enclave signing authority"}
    - {id: B-003, label: "PCS-to-PCCS boundary", separates: "signed authority data from cache and transport"}
    - {id: B-004, label: "Evidence appraisal boundary", separates: "reported Evidence from accepted Evidence"}
    - {id: B-005, label: "Result transport boundary", separates: "Verifier-signed claims from untrusted delivery"}
    - {id: B-006, label: "Result-use boundary", separates: "authenticated Result from asset authorization"}
    - {id: B-007, label: "TD-workload boundary", separates: "whole-VM Evidence from container identity"}
  threat_model:
    untrusted: [host, hypervisor, network, non_enclave_qgs_daemon, pccs_cache, attester_supplied_values_before_appraisal]
    attacker_can: [drop, delay, replay, reorder, substitute, deny_service]
    trusted_assumptions:
      - CPU, TDX Module, TDQE and selected attestation-key/PCK trust chain
      - PCS signatures and accepted Intel trust anchors
      - Verifier implementation, reference values, appraisal policy, signing-key custody
      - Relying Party Result trust store, release policy, trustworthy time and maximum clock skew
      - selected cryptographic algorithms and implementations
      - approved ephemeral private key remains inside the intended TD boundary
    not_guaranteed: [availability, code_correctness, future_behavior, all_side_channels, protected_external_io]
  digest_suite:
    status: "symbolic invariants only; not directly implementable until a deployment profile instantiates every byte-level choice"
    suite_id: deployment_must_assign_a_concrete_id
    required_instantiation:
      - hash algorithm and output length
      - allowed key algorithms and canonical public-key byte encoding
      - canonical field encoding, field order, and length delimiting
      - distinct domain tags and profile version
      - exact mapping of D into the fixed 64-byte REPORTDATA field
    invariants:
      - hash algorithm, key algorithm, canonical key encoding, field order, length delimiting, and domain tags are version-fixed
      - K equals Hash of key domain tag, key algorithm, and canonical public-key bytes
      - D equals Hash of context domain tag and canonical nonce, request ID, subject, audience, and K; D is stored in REPORTDATA
      - E equals Hash of Evidence domain tag and the exact TD Quote octets transported on E-012 and E-013
  context_dependencies:
    - {id: X-001, value: nonce, producer: N-003, requirements: [CSPRNG, policy_minimum_entropy], retained_by: N-003, transported_by: N-002, bound_at: N-004, compared_by: N-003, consumed_by: N-003, terminal_events: [allow, deny, expiry]}
    - {id: X-002, value: request_id_subject_audience, producer: N-002, retained_by: [N-002, N-003], bound_at: N-004, compared_by: [N-003, N-002]}
    - {id: X-003, value: canonical_public_key_bytes_and_K, producer: N-004, transport_edges: [E-012, E-013], bound_in_D_at: N-004, recomputed_by: N-003, approved_in_result_edge: E-015, possession_edges: [E-016, E-017], channel_edge: E-018}
    - {id: X-004, value: exact_quote_octets_and_E, producer: N-006, transport_edges: [E-010, E-011, E-012, E-013], recomputed_by: [N-003, N-002], approved_in_result_edge: E-015}
  request_state_machine:
    initial: issued
    terminal: [allow_consumed, deny_consumed, expired]
    retry_rule: "close the old record and issue a fresh nonce/request attempt"
    invariant: "one terminal appraisal per request record"
    ordering: "an atomic issued-to-terminal transition must succeed before emitting any terminal Result"
    relying_party_replay_rule: "after successful Result and PoP checks, atomically transition unused to release_committed before secret delivery; only the winning transition may release"
  result_profile:
    status: "example minimum profile, not a universal RFC 9334 wire format"
    protection: "Verifier signature checked against an authorized Verifier key"
    common_claims: [profile_version, digest_suite_id, verdict, issuer, subject, audience, request_id, issued_at, expiry, appraisal_policy_id, appraisal_policy_version, evidence_digest_E]
    allow_only_claims: [approved_key_digest_K]
    consumer_checks: [signature, authorized_issuer, verdict, accepted_profile_and_policy_versions, subject, audience, request_id, trustworthy_time_and_skew, evidence_digest_E, allow_only_approved_key_digest_K]
