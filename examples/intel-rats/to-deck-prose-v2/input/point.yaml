visual_priority:
  dominant_visual: "plain roles → separate QGS daemon and TDQE → K/D/E verification → signed Result → PoP → allow/deny action"
  must_show:
    - QGS daemon and TDQE are separate actors with an explicit trust boundary
    - PCS authority and PCCS cache are separate in a second collateral diagram
    - Verifier retains and terminally consumes challenge state
    - Canonical key bytes travel to RP and Verifier; K is bound into D in REPORTDATA
    - E covers exact Quote octets; Result names verdict, policy version, E, and allow-only approved K
    - RP verifies Result/time/E/K, proves possession, and releases only through the same key-bound channel
    - Deny, expiry, replay, invalid, and terminal error release no key
  secondary_visuals:
    - proof versus non-proof comparison
    - accountable appraisal and result-use owners with numeric pilot gates
