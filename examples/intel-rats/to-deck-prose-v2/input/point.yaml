canonical_topic: Intel TDX Remote Attestation
project_role: teaching_vehicle
objective: >-
  Intel TDX 원격 증명을 초보 개발자와 기술 임원이 설명하고 의사결정할 수 있도록,
  adversary/trust model, distinct Intel actors, retained challenge, K/D/E digest suite,
  protected Result, proof of possession, policy-gated release, proof limits, and Intel-rats value를 닫힌 모델로 제공한다.
audience: [novice_developer, technical_executive]
mode: domain_through_project
question: Intel TDX Remote Attestation은 어떤 문제를 어떻게 해결하며, Intel-rats는 이를 이해하는 데 어떤 고유한 가치를 제공하는가?
title: "Intel TDX 원격 증명: 승인한 VM에만 비밀을 공개하는 통제"
point: >-
  Intel TDX 원격 증명은 클라우드 운영자를 전적으로 믿지 않아도,
  증거 평가 서비스가 TDX VM의 하드웨어 보고를 조직 기준으로 확인하고,
  키 관리 서비스가 별도 공개 정책을 통과한 VM에만 비밀을 내주게 하는 절차다.
teachback_expected:
  novice_developer: >-
    RP가 request ID, subject, audience를 정하고 Verifier가 nonce를 발급·보관한다. TD는 protocol-fixed
    canonical key bytes의 K와 context digest D를 REPORTDATA에 넣어 TDREPORT를 만들고, non-enclave QGS
    daemon이 TDQE로 운반한다. TDQE-signed Quote와 key bytes가 RP를 거쳐 Verifier에 도착하면 Verifier가
    K, D, exact-Quote digest E를 재계산하고 signed Result에 verdict, policy version, E와 approved K를 넣는다.
    RP는 Result와 clock, E/K, key possession을 확인한 뒤 같은 키의 channel에만 secret을 보낸다.
  technical_executive: >-
    Remote Attestation은 외부 인프라 workload에 자산을 공개하기 전에 hardware Evidence와 조직 정책으로
    공개를 조건화하는 통제다. appraisal과 release에 각각 단일 책임자를 두고, 회수 가능한 한 key-release
    pilot에서 deny-without-key, replay, revocation, key substitution, clock, collateral outage를 수치 gate로 검증한다.
